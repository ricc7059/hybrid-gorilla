<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0a0a0a" />
<title>Hybrid Gorilla</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #0a0a0a;
  --bg-elev: #141414;
  --bg-elev-2: #1c1c1c;
  --border: #262626;
  --border-strong: #3a3a3a;
  --text: #f4f4f4;
  --text-muted: #8a8a8a;
  --text-dim: #5a5a5a;
  --accent: #E63946;
  --accent-dim: #7a1e26;
  --lift: #E63946;
  --quality: #3a86ff;
  --easy: #06a77d;
  --rest: #6a6a6a;
  --warn: #ffb400;
  --race: #ff006e;
  --cond: #9b5de5;
  --radius: 14px;
  --radius-s: 8px;
  --shadow: 0 4px 20px rgba(0,0,0,0.4);
  --display: "Oswald", "Impact", sans-serif;
  --body: "Manrope", -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: "JetBrains Mono", "SF Mono", Consolas, monospace;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--body); -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; min-height: 100dvh; overscroll-behavior-y: contain; padding-bottom: env(safe-area-inset-bottom); }
.app { max-width: 640px; margin: 0 auto; padding: 0 16px 120px; }

/* ---------- header ---------- */
header.top {
  position: sticky; top: 0; z-index: 40;
  background: linear-gradient(180deg, var(--bg) 70%, rgba(10,10,10,0.92) 100%);
  padding: 20px 0 12px;
  margin: 0 -16px;
  padding-left: 16px; padding-right: 16px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.brand-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
.brand {
  font-family: var(--display);
  font-weight: 700;
  font-size: 22px;
  letter-spacing: 0.06em;
  line-height: 1;
  text-transform: uppercase;
}
.brand .accent { color: var(--accent); }
.countdown { font-family: var(--mono); font-size: 11px; color: var(--text-muted); text-align: right; letter-spacing: 0.04em; }
.countdown strong { display: block; color: var(--text); font-size: 18px; font-family: var(--display); font-weight: 600; letter-spacing: 0.05em; }
.status-bar {
  display: flex; align-items: center; gap: 10px; margin-top: 10px;
  font-family: var(--mono); font-size: 11px; color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase;
}
.status-bar .sep { color: var(--text-dim); }
.progress-track {
  margin-top: 10px; height: 3px; background: var(--bg-elev); border-radius: 2px; overflow: hidden; position: relative;
}
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--race)); transition: width 0.6s ease; }

/* ---------- tabs ---------- */
nav.tabs {
  display: grid; grid-template-columns: repeat(4, 1fr);
  background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; margin: 14px 0 20px;
}
nav.tabs button {
  appearance: none; border: 0; background: transparent; color: var(--text-muted);
  padding: 10px 4px; font-family: var(--display); font-weight: 500; font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase;
  border-radius: var(--radius-s); cursor: pointer;
  transition: all 0.2s ease;
}
nav.tabs button.active { background: var(--bg); color: var(--text); box-shadow: inset 0 0 0 1px var(--border-strong); }

/* ---------- session cards ---------- */
.day-header {
  margin: 18px 0 10px;
  display: flex; align-items: baseline; justify-content: space-between;
}
.day-header .dow {
  font-family: var(--display); font-weight: 700; font-size: 32px; letter-spacing: 0.04em; text-transform: uppercase; line-height: 1;
}
.day-header .date {
  font-family: var(--mono); font-size: 12px; color: var(--text-muted); letter-spacing: 0.04em;
}
.day-subnote {
  font-size: 12px; color: var(--text-muted); margin-bottom: 14px; letter-spacing: 0.02em;
}
.day-subnote .pill {
  display: inline-block; padding: 2px 8px; border-radius: 4px; background: var(--bg-elev); color: var(--text); font-family: var(--mono); font-size: 10px; letter-spacing: 0.05em; margin-right: 6px;
}
.session {
  background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 14px; margin-bottom: 10px;
  position: relative; overflow: hidden;
  transition: border-color 0.2s ease;
}
.session::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
}
.session.lift::before { background: var(--lift); }
.session.quality::before { background: var(--quality); }
.session.easy::before { background: var(--easy); }
.session.long::before { background: var(--easy); }
.session.rest::before { background: var(--rest); }
.session.daily::before { background: var(--warn); }
.session.race::before { background: var(--race); }
.session.conditioning::before { background: var(--cond); }
.session .row1 {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.session .label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted);
}
.session.lift .label { color: var(--lift); }
.session.quality .label { color: var(--quality); }
.session.easy .label { color: var(--easy); }
.session.long .label { color: var(--easy); }
.session.daily .label { color: var(--warn); }
.session.race .label { color: var(--race); }
.session.conditioning .label { color: var(--cond); }
.session .title {
  font-family: var(--display); font-weight: 600; font-size: 20px; letter-spacing: 0.03em; text-transform: uppercase; margin: 4px 0 2px;
}
.session .meta {
  font-size: 13px; color: var(--text); margin-top: 2px; line-height: 1.45;
}
.session .meta .mono { font-family: var(--mono); font-size: 12px; color: var(--text-muted); }
.session button.open {
  margin-top: 10px; appearance: none; border: 1px solid var(--border-strong); background: transparent; color: var(--text);
  padding: 8px 12px; border-radius: var(--radius-s); font-family: var(--display); font-weight: 500; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer;
}
.session button.open:active { background: var(--bg-elev-2); }
.session .check {
  display: flex; align-items: center; gap: 10px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
}
.session .check label { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
.session .check input { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
.session.done { opacity: 0.55; }
.session.done .title { text-decoration: line-through; text-decoration-color: var(--text-dim); }

/* ---------- modal ---------- */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100;
  display: none; align-items: flex-end; justify-content: center;
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg-elev); width: 100%; max-width: 640px; max-height: 88vh; overflow-y: auto;
  border-radius: 20px 20px 0 0; border: 1px solid var(--border);
  padding: 20px 20px 40px;
  animation: slideUp 0.25s ease-out;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-head { display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px; gap: 10px; }
.modal-head h2 { margin: 0; font-family: var(--display); font-weight: 600; font-size: 24px; letter-spacing: 0.04em; text-transform: uppercase; }
.modal-head .sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; font-family: var(--mono); letter-spacing: 0.04em; }
.modal-head button.close {
  appearance: none; border: 1px solid var(--border-strong); background: transparent; color: var(--text);
  width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; flex-shrink: 0;
}

/* exercise list */
.exercise {
  display: grid; grid-template-columns: 42px 1fr auto; gap: 10px; align-items: start;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.exercise:last-child { border-bottom: none; }
.exercise .ord {
  font-family: var(--display); font-weight: 700; font-size: 14px; letter-spacing: 0.04em;
  color: var(--accent); padding-top: 2px;
}
.exercise .name { font-weight: 600; font-size: 14px; line-height: 1.3; }
.exercise .note { font-size: 11px; color: var(--text-muted); margin-top: 3px; line-height: 1.4; }
.exercise .phase-badge { display: inline-block; font-family: var(--mono); font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 5px; border-radius: 3px; background: rgba(230,57,70,0.15); color: var(--accent); margin-top: 3px; }
.exercise .sets { font-family: var(--mono); font-size: 13px; color: var(--text); text-align: right; white-space: nowrap; }
.exercise .sets .reps { display: block; font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.notes-box {
  margin-top: 14px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-s); padding: 10px;
}
.notes-box label { font-family: var(--mono); font-size: 10px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-bottom: 6px; }
.notes-box textarea {
  width: 100%; background: transparent; border: 0; color: var(--text); font-family: var(--body); font-size: 13px;
  resize: vertical; min-height: 50px; outline: none; line-height: 1.4;
}

/* phase progression note */
.phase-note {
  background: rgba(230,57,70,0.07); border: 1px solid rgba(230,57,70,0.2); border-radius: var(--radius-s);
  padding: 10px 12px; margin-bottom: 14px; font-size: 12px; color: var(--text-muted); line-height: 1.5;
}
.phase-note strong { color: var(--accent); font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; }

/* ---------- week view ---------- */
.week-card {
  background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px; margin-bottom: 8px; cursor: pointer;
  display: grid; grid-template-columns: 48px 1fr 24px; gap: 12px; align-items: center;
  transition: transform 0.1s ease;
}
.week-card:active { transform: scale(0.98); }
.week-card.today { border-color: var(--accent); background: linear-gradient(135deg, var(--bg-elev) 70%, rgba(230,57,70,0.12) 100%); }
.week-card .dow-box {
  font-family: var(--display); font-weight: 700; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--text-muted); text-align: center; line-height: 1.1;
}
.week-card .dow-box .num { display: block; font-size: 20px; color: var(--text); margin-top: 2px; }
.week-card.today .dow-box { color: var(--accent); }
.week-card.today .dow-box .num { color: var(--accent); }
.week-card .content .title { font-family: var(--display); font-weight: 500; font-size: 14px; letter-spacing: 0.05em; text-transform: uppercase; }
.week-card .content .sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.week-card .dots { display: flex; gap: 3px; align-items: center; }
.week-card .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border-strong); }
.week-card .dot.active { background: var(--accent); }
.week-card .chev { color: var(--text-dim); font-size: 18px; }

/* ---------- plan view ---------- */
.phase {
  margin-bottom: 20px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
}
.phase-head {
  padding: 14px; cursor: pointer;
  display: flex; justify-content: space-between; align-items: center; gap: 10px;
}
.phase-head .num {
  font-family: var(--display); font-weight: 700; font-size: 40px; letter-spacing: -0.02em; color: var(--bg-elev-2);
  line-height: 0.9; flex-shrink: 0; width: 44px;
}
.phase.current .phase-head .num { color: var(--accent); }
.phase-head .info { flex: 1; min-width: 0; }
.phase-head .info .name { font-family: var(--display); font-weight: 600; font-size: 18px; letter-spacing: 0.04em; text-transform: uppercase; }
.phase-head .info .range { font-size: 11px; color: var(--text-muted); font-family: var(--mono); letter-spacing: 0.04em; margin-top: 2px; }
.phase-head .chev { color: var(--text-dim); font-size: 18px; transition: transform 0.2s ease; }
.phase.open .phase-head .chev { transform: rotate(90deg); }
.phase-body { display: none; padding: 0 14px 14px; }
.phase.open .phase-body { display: block; }
.phase-intro { font-size: 12px; color: var(--text-muted); line-height: 1.55; margin-bottom: 14px; padding: 10px; background: var(--bg); border-radius: var(--radius-s); border: 1px solid var(--border); }
.plan-week {
  padding: 10px 0; border-top: 1px solid var(--border); cursor: pointer;
  display: grid; grid-template-columns: 58px 1fr auto; gap: 10px; align-items: start;
}
.plan-week:first-child { border-top: none; padding-top: 0; }
.plan-week .wnum {
  font-family: var(--mono); font-size: 11px; color: var(--text-muted); letter-spacing: 0.04em;
  text-transform: uppercase; padding-top: 3px;
}
.plan-week.current .wnum { color: var(--accent); }
.plan-week .wbody .wtitle { font-family: var(--display); font-weight: 500; font-size: 13px; letter-spacing: 0.05em; text-transform: uppercase; }
.plan-week .wbody .wsub { font-size: 11px; color: var(--text-muted); margin-top: 3px; line-height: 1.5; }
.plan-week .wbody .wsub b { color: var(--text); font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
.plan-week .wrir { font-family: var(--mono); font-size: 10px; color: var(--text-muted); padding-top: 3px; white-space: nowrap; }

/* ---------- paces ---------- */
.paces-intro { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.5; }
.paces-intro b { color: var(--text); font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; }
.pace-row {
  display: grid; grid-template-columns: 1fr auto; gap: 10px; padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.pace-row:last-child { border-bottom: none; }
.pace-row .pname { font-family: var(--display); font-weight: 600; font-size: 14px; letter-spacing: 0.06em; text-transform: uppercase; }
.pace-row .pnote { font-size: 11px; color: var(--text-muted); margin-top: 3px; line-height: 1.4; }
.pace-row .pval { font-family: var(--mono); font-size: 13px; text-align: right; white-space: nowrap; }
.pace-row .pval .arrow { color: var(--text-dim); padding: 0 4px; }
.pace-row .pval .now { color: var(--accent); }
.pace-row .pval .goal { color: var(--text); }
.tt-history {
  margin-top: 24px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px;
}
.tt-history h3 {
  margin: 0 0 12px; font-family: var(--display); font-weight: 600; font-size: 16px; letter-spacing: 0.06em; text-transform: uppercase;
}
.tt-row { display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: baseline; padding: 8px 0; border-bottom: 1px dashed var(--border); }
.tt-row:last-child { border-bottom: none; }
.tt-row .wk { font-family: var(--mono); font-size: 11px; color: var(--text-muted); letter-spacing: 0.04em; }
.tt-row .lab { font-size: 12px; }
.tt-row .val { font-family: var(--mono); font-size: 13px; }
.tt-row input.tt-input { width: 70px; background: var(--bg); border: 1px solid var(--border-strong); color: var(--text); font-family: var(--mono); font-size: 13px; padding: 4px 6px; border-radius: 4px; text-align: right; }
.tt-row .target { color: var(--text-muted); font-size: 11px; }

/* ---------- generic ---------- */
h2.section-head { font-family: var(--display); font-weight: 600; font-size: 20px; letter-spacing: 0.06em; text-transform: uppercase; margin: 20px 0 10px; }
.hint { font-size: 11px; color: var(--text-muted); margin-top: 6px; font-style: italic; }
.dl-btn {
  display: block; width: 100%; margin: 0 0 14px;
  appearance: none; background: var(--bg-elev); border: 1px solid var(--border-strong);
  color: var(--text-muted); padding: 10px; border-radius: var(--radius-s);
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; text-align: center;
}
.dl-btn:active { background: var(--bg-elev-2); }
.tv-btn {
  appearance: none; border: 1px solid var(--border); background: transparent; color: var(--text-muted);
  padding: 5px 4px; border-radius: 6px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
  cursor: pointer; transition: all 0.15s;
}
.tv-btn.tv-active { background: var(--bg-elev-2); color: var(--warn); border-color: var(--warn); }
.tv-btn:active { opacity: 0.7; }
.waist-box {
  background: linear-gradient(135deg, rgba(255,180,0,0.08), rgba(255,180,0,0.02));
  border: 1px solid rgba(255,180,0,0.2);
  padding: 12px 14px; border-radius: var(--radius); margin: 14px 0;
  font-size: 12px; color: var(--text);
}
.waist-box .title { font-family: var(--display); font-weight: 600; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--warn); margin-bottom: 4px; }
.week-nav {
  display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 14px;
}
.week-nav button { appearance: none; background: var(--bg-elev); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: var(--radius-s); font-family: var(--display); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; }
.week-nav button:disabled { opacity: 0.4; cursor: not-allowed; }
.week-nav .wlabel { font-family: var(--display); font-weight: 600; font-size: 16px; letter-spacing: 0.06em; text-transform: uppercase; }

/* race countdown banner */
.race-banner {
  background: linear-gradient(135deg, var(--race), var(--accent));
  color: #fff; padding: 14px; border-radius: var(--radius); margin-bottom: 14px;
  font-family: var(--display); letter-spacing: 0.06em; text-transform: uppercase;
  display: flex; justify-content: space-between; align-items: center;
}
.race-banner .lab { font-size: 11px; opacity: 0.9; }
.race-banner .days { font-size: 24px; font-weight: 700; }

@media (max-width: 380px) {
  .brand { font-size: 22px; }
  .day-header .dow { font-size: 26px; }
  .session .title { font-size: 17px; }
  .modal-head h2 { font-size: 20px; }
}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand-row">
      <div class="brand">HYBRID GORILLA <span class="accent">2.0</span></div>
      <div class="countdown">
        <span>Race Day</span>
        <strong id="raceCountdown">—</strong>
      </div>
    </div>
    <div class="status-bar">
      <span id="phaseBadge">Phase 1</span>
      <span class="sep">·</span>
      <span id="weekBadge">Week 1 / 36</span>
      <span class="sep">·</span>
      <span id="dayBadge">Day 1 / 252</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </header>

  <nav class="tabs">
    <button data-view="today" class="active">Today</button>
    <button data-view="week">Week</button>
    <button data-view="plan">Plan</button>
    <button data-view="paces">Paces</button>
  </nav>

  <main id="view"></main>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal" id="modalContent"></div>
</div>

<script>
/* ============================================================
   DATA
   ============================================================ */

const PROGRAM_START = new Date('2026-04-27T00:00:00');
const PROGRAM_END   = new Date('2026-12-31T23:59:59');
const TOTAL_WEEKS   = 36;
const TOTAL_DAYS    = 249;

const PHASES = [
  { id:1, name:'Foundation', range:'Weeks 1–8 · Apr 27 – Jun 21', weeks:[1,2,3,4,5,6,7,8],
    liftDays:['mon','wed','fri'], intro:'Build habits, standardize form, accumulate stimulus. DB bench focus — master ROM and control across 3×8–12. Running introduces threshold and VO2max fartleks. Deload + first time trial at Week 8 targeting ~20:00–20:30 (Sat Jun 20).' },
  { id:2, name:'Volume Bump', range:'Weeks 9–16 · Jun 22 – Aug 16', weeks:[9,10,11,12,13,14,15,16],
    liftDays:['mon','wed','fri'], intro:'+20% volume on delts, back, and quads. DB bench continues to heavy loading — aim for 75–90lb DBs by end of Phase 2. Running introduces goal-pace intervals (6:00/mi). Week 16 time trial target: 18:45–19:15 (Sat Aug 15).' },
  { id:3, name:'Transition', range:'Weeks 17–24 · Aug 17 – Oct 11', weeks:[17,18,19,20,21,22,23,24],
    liftDays:['mon','wed','fri'], intro:'Lifting drops to 2 days/week (Upper A Mon + Lower Wed). Upper B replaced by Conditioning Day (Fri). Barbell bench transitions in — intentionally lighter, rebuild mechanics at 8–12 reps. Running becomes the priority. Week 23 time trial target: 18:30 (Sat Oct 3).' },

/* ============================================================
   TIME UTILITIES
   ============================================================ */
const MS_DAY = 86400000;

function daysSince(date) {
  return Math.floor((Date.now() - date.getTime()) / MS_DAY);
}
function daysUntil(date) {
  return Math.max(0, Math.ceil((date.getTime() - Date.now()) / MS_DAY));
}
function currentWeekNum() {
  const d = daysSince(PROGRAM_START);
  return Math.min(TOTAL_WEEKS, Math.max(1, Math.ceil((d + 1) / 7)));
}
function currentPhase(wk) {
  return PHASES.find(p => p.weeks.includes(wk)) || PHASES[0];
}
function weekStartDate(wk) {
  const d = new Date(PROGRAM_START);
  d.setDate(d.getDate() + (wk - 1) * 7);
  return d;
}
function formatDate(d) {
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}
function dowName(d) {
  return ['SUN','MON','TUE','WED','THU','FRI','SAT'][d.getDay()];
}
function dowFull(d) {
  return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()];
}

   ============================================================ */

// Day types per phase
function getDayType(dow, phase) {
  // dow: 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
  const p = phase.id;
  if (dow === 0) return 'rest';        // Sunday: Rest / Thunder 45
  if (dow === 1) return 'upperA';      // Monday: Upper A all phases
  if (dow === 2) return 'quality';     // Tuesday: Quality run
  if (dow === 3) return 'lower';       // Wednesday: Lower all phases
  if (dow === 4) return 'quality';     // Thursday: Quality run
  if (dow === 5) {
    if (p <= 2) return 'upperB';       // Friday Ph1-2: Upper B
    return 'conditioning';             // Friday Ph3+: Conditioning
  }
  if (dow === 6) return 'long';        // Saturday: Long run
  return 'rest';
}

/* ============================================================
   STORAGE
   ============================================================ */
const STORE_KEY = 'hybrid-gorilla-v2';
function load() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { return {}; }
}
function save(data) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(data)); } catch {}
}
function getCompletion(weekNum, dow) {
  const d = load();
  return !!(d[`done-${weekNum}-${dow}`]);
}
function toggleCompletion(weekNum, dow) {
  const d = load();
  const k = `done-${weekNum}-${dow}`;
  d[k] = !d[k];
  save(d);
}
function getNotes(key) {
  return load()[`notes-${key}`] || '';
}
function saveNotes(key, val) {
  const d = load();
  d[`notes-${key}`] = val;
  save(d);
}
function getTT(weekNum) {
  return load()[`tt-${weekNum}`] || '';
}
function saveTT(weekNum, val) {
  const d = load();
  d[`tt-${weekNum}`] = val;
  save(d);
}

/* ============================================================
   MODAL
   ============================================================ */
function openModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

/* ============================================================
   EXERCISE RENDERER
   ============================================================ */
function renderExercises(exercises, phase, isMaintenance) {
  return exercises.map(ex => {
    const hidden = isMaintenance && ex.maintenance === false;
    if (hidden) return '';
    const sets = isMaintenance && ex.maintenanceSets ? ex.maintenanceSets : ex.sets;
    const setsLabel = sets ? `${sets}` : '—';

    let nameHtml = `<div class="name">${ex.name}</div>`;
    if (ex.phaseBench) {
      const benchPhase = phase <= 2 ? 'Ph 1–2: DB Bench' : 'Ph 3+: BB Bench';
      nameHtml += `<div class="phase-badge">${benchPhase}</div>`;
    }
    if (ex.landmine) {
      nameHtml += `<div class="phase-badge" style="background:rgba(155,93,229,0.15);color:var(--cond);">Landmine</div>`;
    }

    return `<div class="exercise">
      <div class="ord">${ex.ord}</div>
      <div>
        ${nameHtml}
        <div class="note">${ex.note}</div>
      </div>
      <div class="sets">${setsLabel}<span class="reps">${ex.reps}</span></div>
    </div>`;
  }).join('');
}

function liftModal(liftKey, weekNum, phase) {
  // Resolve exercise set based on gym mode
  let session, travelNote = '';
  if (gymMode === 'home' || liftKey === 'conditioning') {
    session = LIFT[liftKey];
  } else if (gymMode === 'travel-best') {
    const tSet = TRAVEL.best[liftKey];
    session = { ...LIFT[liftKey], exercises: tSet || LIFT[liftKey].exercises };
    travelNote = `<div class="phase-note" style="border-color:rgba(255,180,0,0.3);background:rgba(255,180,0,0.06)"><strong style="color:var(--warn);">✈ Travel Mode — Best Case</strong><br>${TRAVEL.best.note}</div>`;
  } else {
    const tSet = TRAVEL.worst[liftKey];
    session = { ...LIFT[liftKey], exercises: tSet || LIFT[liftKey].exercises };
    travelNote = `<div class="phase-note" style="border-color:rgba(255,180,0,0.3);background:rgba(255,180,0,0.06)"><strong style="color:var(--warn);">✈ Travel Mode — Worst Case</strong><br>${TRAVEL.worst.note}</div>`;
  }
  if (!session) return;
  const isMaintenance = phase.id >= 4 && liftKey !== 'conditioning';
  const phaseBench = phase.id;

  let phaseNote = '';
  if (liftKey === 'upperA') {
    if (phaseBench <= 2) {
      phaseNote = `<div class="phase-note"><strong>Phase ${phaseBench} — DB Bench</strong> · Building ROM, control, and connective tissue readiness. Load toward 75–90lb DBs by end of Phase 2.</div>`;
    } else {
      phaseNote = `<div class="phase-note"><strong>Phase ${phaseBench} — Barbell Bench</strong> · Olympic bar. Drop load, rebuild mechanics at 8–12 reps first. Progressive overload from here to race day.</div>`;
    }
  }
  if (liftKey === 'lower') {
    const rotNote = phase.id === 1 ? '2×8–10/side · technique focus' : phase.id === 2 ? '2×10–12/side · moderate load' : '3×12–15/side · rotational power';
    phaseNote = `<div class="phase-note"><strong>F1 — Landmine Rotation this phase:</strong> ${rotNote}</div>`;
  }
  if (liftKey === 'conditioning') {
    const cPhase = phase.id;
    const emomMin = cPhase === 4 ? '15 min · 150 reps' : '10 min · 100 reps';
    const vest = cPhase === 3 ? 'Bodyweight' : cPhase === 4 ? 'Weighted vest · 15–20 lbs, progressive' : 'Weighted vest · Phase 4 peak load';
    const duration = cPhase === 3 ? '~35 min' : cPhase === 4 ? '~40 min' : '~32 min';
    const feel = cPhase === 3 ? 'Power quality + conditioning foundation' : cPhase === 4 ? 'Peak metabolic output — you should be gassed' : 'Volume reduced, intensity maintained — arrive at race week fresh';
    phaseNote = `<div class="phase-note">
      <strong>Phase ${cPhase} Conditioning · ${duration}</strong><br>
      ${feel}<br>
      <strong>Burpee EMOM:</strong> ${emomMin} · ${vest}<br>
      <strong>B-block format:</strong> ${cPhase === 4 ? 'Circuit — B1→B2→B3, 45s rest between rounds' : 'Straight sets — rest 90s between exercises'}
    </div>`;
  }

  const notesKey = `lift-${liftKey}-w${weekNum}`;
  const savedNotes = getNotes(notesKey);

  const html = `
    <div class="modal-head">
      <div>
        <h2>${session.name}</h2>
        <div class="sub">${session.focus} · ${session.duration}${session.phases ? ' · ' + session.phases : ''}</div>
      </div>
      <button class="close" onclick="closeModal()">✕</button>
    </div>
    ${travelNote}
    ${phaseNote}
    ${isMaintenance ? '<div class="phase-note"><strong>Maintenance Phase</strong> · Compounds only, sets reduced. Keep intensity — quality over volume.</div>' : ''}
    ${renderExercises(session.exercises, phaseBench, isMaintenance)}
    <div class="notes-box">
      <label>Session Notes — Week ${weekNum}</label>
      <textarea placeholder="Load, PRs, how it felt…" onchange="saveNotes('${notesKey}', this.value)">${savedNotes}</textarea>
    </div>
    <div style="margin-top:12px;font-size:11px;color:var(--text-muted);">
      <strong style="color:var(--warn);">Delt Finisher reminder:</strong> Tue / Thu / Sun (+ optional Sat) · 10–12 min · See delt finisher card.
    </div>
  `;
  openModal(html);
}

function deltModal(phase) {
  const fin = phase.id <= 2 ? DELT_FINISHER.p12 : DELT_FINISHER.p345;
  const html = `
    <div class="modal-head">
      <div><h2>Delt Finisher</h2><div class="sub">${fin.label} · ${fin.duration}</div></div>
      <button class="close" onclick="closeModal()">✕</button>
    </div>
    <div class="phase-note"><strong>Non-lift days only:</strong> Tue · Thu · Sun · optional Sat. Do NOT add to lift sessions — already programmed there.</div>
    ${fin.exercises.map(ex => `
      <div class="exercise">
        <div class="ord">${ex.ord}</div>
        <div><div class="name">${ex.name}</div><div class="note">${ex.note}</div></div>
        <div class="sets">${ex.sets}<span class="reps">${ex.reps}</span></div>
      </div>`).join('')}
  `;
  openModal(html);
}

function absModal(trxEnabled) {
  const exercises = [...ABS_SESSION.main];
  if (trxEnabled) {
    exercises.splice(2, 1, ...ABS_SESSION.trx);
  }
  const html = `
    <div class="modal-head">
      <div><h2>Core Session</h2><div class="sub">Daily · 10–12 min · All phases</div></div>
      <button class="close" onclick="closeModal()">✕</button>
    </div>
    <div class="phase-note">Daily — any time of day, separate from main session preferred. Anti-extension + flexion + rotational patterns. Vacuums throughout the day opportunistically.</div>
    ${exercises.map(ex => `
      <div class="exercise">
        <div class="ord">${ex.ord}</div>
        <div><div class="name">${ex.name}</div><div class="note">${ex.note}</div></div>
        <div class="sets">${ex.sets}<span class="reps">${ex.reps}</span></div>
      </div>`).join('')}
    <div class="waist-box" style="margin-top:14px;">
      <div class="title">Ab Vacuums</div>
      Perform opportunistically — desk, car, anywhere. Exhale fully, draw navel to spine, hold 10–15s. 5–10 reps when you remember.
    </div>
  `;
  openModal(html);
}

/* ============================================================
   VIEW — TODAY
   ============================================================ */
function renderToday() {
  const now = new Date();
  const dow = now.getDay();
  const weekNum = currentWeekNum();
  const phase = currentPhase(weekNum);
  const dayType = getDayType(dow, phase);
  const totalDays = Math.min(TOTAL_DAYS, daysSince(PROGRAM_START) + 1);
  const dayOfWeek = dowFull(now);

  // Progress
  const pct = Math.min(100, (daysSince(PROGRAM_START) / TOTAL_DAYS) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('phaseBadge').textContent = `Phase ${phase.id}`;
  document.getElementById('weekBadge').textContent = `Week ${weekNum} / ${TOTAL_WEEKS}`;
  document.getElementById('dayBadge').textContent = `Day ${totalDays} / ${TOTAL_DAYS}`;
  document.getElementById('raceCountdown').textContent = `${daysUntil(PROGRAM_END)} days`;

  let html = `
    <div class="day-header">
      <div class="dow">${dayOfWeek.toUpperCase()}</div>
      <div class="date">${formatDate(now)} · Week ${weekNum}</div>
    </div>
    <div class="day-subnote">
      <span class="pill">Phase ${phase.id}: ${phase.name}</span>
    </div>
  `;

  // Gym mode toggle — show on lift days
  if (['upperA','upperB','lower','conditioning'].includes(dayType)) {
    html += `<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
      <button class="tv-btn${gymMode==='home'?' tv-active':''}" onclick="setGymMode('home')">🏠 Home</button>
      <button class="tv-btn${gymMode==='travel-best'?' tv-active':''}" onclick="setGymMode('travel-best')">✈ Travel Best</button>
      <button class="tv-btn${gymMode==='travel-worst'?' tv-active':''}" onclick="setGymMode('travel-worst')">✈ Travel Worst</button>
    </div>`;
  }

  // Build today's sessions
  const sessions = buildDaySessions(dow, dayType, phase, weekNum);
  sessions.forEach(s => {
    html += renderSessionCard(s, weekNum, dow);
  });

  return html;
}

function buildDaySessions(dow, dayType, phase, weekNum) {
  const sessions = [];
  const isDeload = [8,16,24,32].includes(weekNum);
  const deloadNote = isDeload ? ' · DELOAD WEEK' : '';

  if (dayType === 'upperA') {
    sessions.push({
      type:'lift', key:'upperA',
      label:'Lift · Upper A' + deloadNote,
      title:'Upper A',
      meta:'Chest · Back · Lateral Delt · Arms · ~50 min',
      action: () => liftModal('upperA', weekNum, phase)
    });
  }
  if (dayType === 'upperB') {
    sessions.push({
      type:'lift', key:'upperB',
      label:'Lift · Upper B (Ph 1–2)' + deloadNote,
      title:'Upper B',
      meta:'Shoulders · Delt · Back · Arms · ~50 min',
      action: () => liftModal('upperB', weekNum, phase)
    });
  }
  if (dayType === 'lower') {
    sessions.push({
      type:'lift', key:'lower',
      label:'Lift · Lower' + deloadNote,
      title:'Lower',
      meta:'Posterior Chain · Nordic · Landmine Rotation · ~50 min',
      action: () => liftModal('lower', weekNum, phase)
    });
  }
  if (dayType === 'conditioning') {
    sessions.push({
      type:'conditioning', key:'conditioning',
      label:'Conditioning · Friday (Ph 3–5)',
      title:'Full-Body Conditioning',
      meta:'Burpee Anchor · Swimmer\'s Curl · Landmine · ~35–40 min',
      action: () => liftModal('conditioning', weekNum, phase)
    });
  }
  if (dayType === 'quality') {
    const pKey = `p${Math.min(5, phase.id)}`;
    const r = RUNNING.quality[pKey] || RUNNING.quality.p1;
    sessions.push({
      type:'quality', key:'quality',
      label:'Run · Quality',
      title:r.title,
      meta:r.sub + ' · ' + r.duration,
      detail: r.detail
    });
  }
  if (dayType === 'long') {
    const pKey = `p${Math.min(5, phase.id)}`;
    const r = RUNNING.long[pKey] || RUNNING.long.p1;
    sessions.push({
      type:'long', key:'long',
      label:'Run · Long',
      title:r.title,
      meta:r.sub + ' · ' + r.duration,
      detail: r.detail
    });
  }
  if (dayType === 'rest') {
    sessions.push({
      type:'rest', key:'rest',
      label:'Recovery',
      title:'Rest or Thunder 45',
      meta:'Active recovery. Thunder 45 if the legs are there.',
    });
  }

  // Add daily sessions
  // Delt finisher — all non-lift days including rest/Sunday
  const deltDays = ['quality','long','rest'];
  if (deltDays.includes(dayType)) {
    sessions.push({
      type:'daily', key:'delt',
      label:'Daily · Delt Finisher',
      title:'Delt Finisher',
      meta: phase.id <= 2 ? '3 exercises · ~10 min' : '4 exercises · ~12 min',
      action: () => deltModal(phase)
    });
  }

  if (dayType !== 'rest') {
    // Abs — every training day
    sessions.push({
      type:'daily', key:'abs',
      label:'Daily · Core',
      title:'Abs Session',
      meta:'4 movements · 10–12 min',
      action: () => absModal(false)
    });
  }

  return sessions;
}

function renderSessionCard(s, weekNum, dow) {
  const done = getCompletion(weekNum, dow + '-' + s.key);
  let btnHtml = '';
  if (s.action) {
    const aKey = regAction(s.action);
    btnHtml = `<button class="open" onclick="triggerAction('${aKey}')">View Session →</button>`;
  }

  return `<div class="session ${s.type}${done ? ' done' : ''}">
    <div class="row1">
      <span class="label">${s.label}</span>
    </div>
    <div class="title">${s.title}</div>
    <div class="meta">${s.meta}</div>
    ${s.detail ? `<div class="meta mono" style="margin-top:8px;font-size:11px;">${s.detail}</div>` : ''}
    ${btnHtml}
    <div class="check">
      <label>
        <input type="checkbox" ${done ? 'checked' : ''}
          onchange="toggleCompletion(${weekNum}, '${dow}-${s.key}'); renderView();">
        Mark complete
      </label>
    </div>
  </div>`;
}

/* ============================================================
   VIEW — WEEK
   ============================================================ */
let weekViewWeek = null;

function renderWeek() {
  const wk = weekViewWeek || currentWeekNum();
  weekViewWeek = wk;
  const phase = currentPhase(wk);
  const startDate = weekStartDate(wk);
  const isDeload = [8,16,24,32].includes(wk);

  let html = `
    <div class="week-nav">
      <button ${wk <= 1 ? 'disabled' : ''} onclick="weekViewWeek=${wk-1};renderView()">← Prev</button>
      <div class="wlabel">Week ${wk} · Ph ${phase.id}</div>
      <button ${wk >= TOTAL_WEEKS ? 'disabled' : ''} onclick="weekViewWeek=${wk+1};renderView()">Next →</button>
    </div>
    ${isDeload ? '<div class="phase-note"><strong>DELOAD WEEK</strong> · Sets ÷2, loads maintained, RIR 3. Mandatory recovery.</div>' : ''}
  `;

  const today = new Date();
  for (let i = 0; i < 7; i++) {
    const d = new Date(startDate);
    d.setDate(d.getDate() + i);
    const dow = d.getDay();
    const dayType = getDayType(dow, phase);
    const isToday = d.toDateString() === today.toDateString();
    const label = getDayLabel(dayType, phase);

    html += `<div class="week-card${isToday ? ' today' : ''}" onclick="weekViewWeek=${wk};renderView()">
      <div class="dow-box">${dowName(d)}<span class="num">${d.getDate()}</span></div>
      <div class="content">
        <div class="title">${label.title}</div>
        <div class="sub">${label.sub}</div>
      </div>
      <div class="chev">›</div>
    </div>`;
  }

  return html;
}

function getDayLabel(dayType, phase) {
  const labels = {
    upperA: { title:'Upper A', sub:'Chest · Back · Delts · Arms' },
    upperB: { title:'Upper B', sub:'OHP · Delts · Back · Arms (Ph 1–2)' },
    lower: { title:'Lower', sub:'Squat · Hinge · Nordic · Landmine Rotation' },
    conditioning: { title:'Conditioning', sub:'Burpee · Swimmer\'s Curl · Landmine (Ph 3–5)' },
    quality: { title:'Quality Run', sub: phase.id <= 2 ? 'Threshold + VO2' : phase.id <= 3 ? 'Race-Pace Volume' : '5K Specific' },
    long: { title:'Long Run', sub: phase.id <= 2 ? 'Aerobic Base' : phase.id <= 3 ? 'Steady-State' : 'Peak Volume' },
    rest: { title:'Rest / Thunder 45', sub:'Active recovery · optional delt finisher' },
  };
  return labels[dayType] || { title:'Rest', sub:'' };
}

function renderPlan() {
  const weekNum = currentWeekNum();
  let html = '';

  PHASES.forEach(phase => {
    const isCurrent = phase.weeks.includes(weekNum);
    html += `<div class="phase${isCurrent ? ' current open' : ''}">
      <div class="phase-head" onclick="this.parentElement.classList.toggle('open')">
        <div class="num">${phase.id}</div>
        <div class="info">
          <div class="name">${phase.name}</div>
          <div class="range">${phase.range}</div>
        </div>
        <div class="chev">›</div>
      </div>
      <div class="phase-body">
        <div class="phase-intro">${phase.intro}</div>
        ${phase.weeks.map(wk => {
          const isCurrent2 = wk === weekNum;
          const isDeload = [8,16,24,32].includes(wk);
          const rir = wk <= 8 ? (wk <= 5 ? 'RIR 2→1' : wk === 8 ? 'DELOAD' : 'RIR 1–2') :
                       wk <= 16 ? (wk === 16 ? 'DELOAD' : 'RIR 1–2') :
                       wk <= 24 ? (wk === 24 ? 'DELOAD' : 'RIR 1') :
                       wk <= 32 ? (wk === 32 ? 'DELOAD' : 'RIR 0–1') : 'RIR 0–1';

          const wsub = ttWeeks[wk] ? `<b>${ttWeeks[wk]}</b>` : (isDeload ? '<b>DELOAD</b>' : '');
          return `<div class="plan-week${isCurrent2 ? ' current' : ''}">

            <div class="wbody">

            <div class="wrir">${rir}</div>

        }).join('')}
      </div>
    </div>`;
  });

  return html;
}

let currentView = 'today';

function renderView() {
  // Reset action registry on every render
  _actIdx = 0;
  for (const k in _acts) delete _acts[k];
  const el = document.getElementById('view');
  if (currentView === 'today') el.innerHTML = renderToday();
  else if (currentView === 'week') el.innerHTML = renderWeek();
  else if (currentView === 'plan') el.innerHTML = renderPlan();
  else if (currentView === 'paces') el.innerHTML = renderPaces();
}

document.querySelectorAll('nav.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    currentView = btn.dataset.view;
    document.querySelectorAll('nav.tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderView();
  });
});

// Init
renderView();
</script>
