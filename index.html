<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0a0a0a" />
<title>Hybrid Gorilla</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:            #0a0a0a;
    --bg-elev:       #141414;
    --bg-elev-2:     #1c1c1c;
    --border:        #262626;
    --border-strong: #3a3a3a;
    --text:          #f4f4f4;
    --text-muted:    #8a8a8a;
    --text-dim:      #5a5a5a;
    --accent:        #E63946;
    --accent-dim:    #7a1e26;
    --lift:          #E63946;
    --quality:       #3a86ff;
    --easy:          #06a77d;
    --rest:          #6a6a6a;
    --warn:          #ffb400;
    --race:          #ff006e;

    --radius:   14px;
    --radius-s: 8px;

    --shadow: 0 4px 20px rgba(0,0,0,0.4);

    --display: "Oswald", "Impact", sans-serif;
    --body:    "Manrope", -apple-system, BlinkMacSystemFont, sans-serif;
    --mono:    "JetBrains Mono", "SF Mono", Consolas, monospace;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--body); -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; min-height: 100dvh; overscroll-behavior-y: contain; padding-bottom: env(safe-area-inset-bottom); }

  .app { max-width: 640px; margin: 0 auto; padding: 0 16px 120px; }

  /* ---------- header ---------- */
  header.top {
    position: sticky; top: 0; z-index: 40;
    background: linear-gradient(180deg, var(--bg) 70%, rgba(10,10,10,0.92) 100%);
    padding: 20px 0 12px;
    margin: 0 -16px;
    padding-left: 16px; padding-right: 16px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .brand-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
  .brand {
    font-family: var(--display);
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 0.06em;
    line-height: 1;
    text-transform: uppercase;
  }
  .brand .accent { color: var(--accent); }
  .countdown { font-family: var(--mono); font-size: 11px; color: var(--text-muted); text-align: right; letter-spacing: 0.04em; }
  .countdown strong { display: block; color: var(--text); font-size: 18px; font-family: var(--display); font-weight: 600; letter-spacing: 0.05em; }

  .status-bar {
    display: flex; align-items: center; gap: 10px; margin-top: 10px;
    font-family: var(--mono); font-size: 11px; color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase;
  }
  .status-bar .sep { color: var(--text-dim); }

  .progress-track {
    margin-top: 10px; height: 3px; background: var(--bg-elev); border-radius: 2px; overflow: hidden; position: relative;
  }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--race)); transition: width 0.6s ease; }
  .progress-markers { position: relative; height: 12px; margin-top: 4px; }
  .progress-marker { position: absolute; top: 0; font-family: var(--mono); font-size: 9px; color: var(--text-dim); transform: translateX(-50%); }
  .progress-marker.active { color: var(--accent); }

  /* ---------- tabs ---------- */
  nav.tabs {
    display: grid; grid-template-columns: repeat(4, 1fr);
    background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; margin: 14px 0 20px;
  }
  nav.tabs button {
    appearance: none; border: 0; background: transparent; color: var(--text-muted);
    padding: 10px 4px; font-family: var(--display); font-weight: 500; font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase;
    border-radius: var(--radius-s); cursor: pointer;
    transition: all 0.2s ease;
  }
  nav.tabs button.active { background: var(--bg); color: var(--text); box-shadow: inset 0 0 0 1px var(--border-strong); }

  /* ---------- session cards ---------- */
  .day-header {
    margin: 18px 0 10px;
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .day-header .dow {
    font-family: var(--display); font-weight: 700; font-size: 32px; letter-spacing: 0.04em; text-transform: uppercase; line-height: 1;
  }
  .day-header .date {
    font-family: var(--mono); font-size: 12px; color: var(--text-muted); letter-spacing: 0.04em;
  }
  .day-subnote {
    font-size: 12px; color: var(--text-muted); margin-bottom: 14px; letter-spacing: 0.02em;
  }
  .day-subnote .pill {
    display: inline-block; padding: 2px 8px; border-radius: 4px; background: var(--bg-elev); color: var(--text); font-family: var(--mono); font-size: 10px; letter-spacing: 0.05em; margin-right: 6px;
  }

  .session {
    background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 14px; margin-bottom: 10px;
    position: relative; overflow: hidden;
    transition: border-color 0.2s ease;
  }
  .session::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  }
  .session.lift::before    { background: var(--lift); }
  .session.quality::before { background: var(--quality); }
  .session.easy::before    { background: var(--easy); }
  .session.long::before    { background: var(--easy); }
  .session.rest::before    { background: var(--rest); }
  .session.daily::before   { background: var(--warn); }
  .session.race::before    { background: var(--race); }

  .session .row1 {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .session .label {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted);
  }
  .session.lift .label    { color: var(--lift); }
  .session.quality .label { color: var(--quality); }
  .session.easy .label    { color: var(--easy); }
  .session.long .label    { color: var(--easy); }
  .session.daily .label   { color: var(--warn); }
  .session.race .label    { color: var(--race); }

  .session .title {
    font-family: var(--display); font-weight: 600; font-size: 20px; letter-spacing: 0.03em; text-transform: uppercase; margin: 4px 0 2px;
  }
  .session .meta {
    font-size: 13px; color: var(--text); margin-top: 2px; line-height: 1.45;
  }
  .session .meta .mono { font-family: var(--mono); font-size: 12px; color: var(--text-muted); }

  .session button.open {
    margin-top: 10px; appearance: none; border: 1px solid var(--border-strong); background: transparent; color: var(--text);
    padding: 8px 12px; border-radius: var(--radius-s); font-family: var(--display); font-weight: 500; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer;
  }
  .session button.open:active { background: var(--bg-elev-2); }

  .session .check {
    display: flex; align-items: center; gap: 10px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
  }
  .session .check label { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
  .session .check input { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }

  .session.done { opacity: 0.55; }
  .session.done .title { text-decoration: line-through; text-decoration-color: var(--text-dim); }

  /* ---------- modal ---------- */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100;
    display: none; align-items: flex-end; justify-content: center;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-elev); width: 100%; max-width: 640px; max-height: 88vh; overflow-y: auto;
    border-radius: 20px 20px 0 0; border: 1px solid var(--border);
    padding: 20px 20px 40px;
    animation: slideUp 0.25s ease-out;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .modal-head { display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px; gap: 10px; }
  .modal-head h2 { margin: 0; font-family: var(--display); font-weight: 600; font-size: 24px; letter-spacing: 0.04em; text-transform: uppercase; }
  .modal-head .sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; font-family: var(--mono); letter-spacing: 0.04em; }
  .modal-head button.close {
    appearance: none; border: 1px solid var(--border-strong); background: transparent; color: var(--text);
    width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; flex-shrink: 0;
  }

  /* exercise list */
  .exercise {
    display: grid; grid-template-columns: 42px 1fr auto; gap: 10px; align-items: start;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .exercise:last-child { border-bottom: none; }
  .exercise .ord {
    font-family: var(--display); font-weight: 700; font-size: 14px; letter-spacing: 0.04em;
    color: var(--accent); padding-top: 2px;
  }
  .exercise .name { font-weight: 600; font-size: 14px; line-height: 1.3; }
  .exercise .note { font-size: 11px; color: var(--text-muted); margin-top: 3px; line-height: 1.4; }
  .exercise .sets { font-family: var(--mono); font-size: 13px; color: var(--text); text-align: right; white-space: nowrap; }
  .exercise .sets .reps { display: block; font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .notes-box {
    margin-top: 14px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-s); padding: 10px;
  }
  .notes-box label { font-family: var(--mono); font-size: 10px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-bottom: 6px; }
  .notes-box textarea {
    width: 100%; background: transparent; border: 0; color: var(--text); font-family: var(--body); font-size: 13px;
    resize: vertical; min-height: 50px; outline: none; line-height: 1.4;
  }

  /* ---------- week view ---------- */
  .week-card {
    background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px; margin-bottom: 8px; cursor: pointer;
    display: grid; grid-template-columns: 48px 1fr 24px; gap: 12px; align-items: center;
    transition: transform 0.1s ease;
  }
  .week-card:active { transform: scale(0.98); }
  .week-card.today { border-color: var(--accent); background: linear-gradient(135deg, var(--bg-elev) 70%, rgba(230,57,70,0.12) 100%); }
  .week-card .dow-box {
    font-family: var(--display); font-weight: 700; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--text-muted); text-align: center; line-height: 1.1;
  }
  .week-card .dow-box .num { display: block; font-size: 20px; color: var(--text); margin-top: 2px; }
  .week-card.today .dow-box { color: var(--accent); }
  .week-card.today .dow-box .num { color: var(--accent); }
  .week-card .content .title { font-family: var(--display); font-weight: 500; font-size: 14px; letter-spacing: 0.05em; text-transform: uppercase; }
  .week-card .content .sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .week-card .dots { display: flex; gap: 3px; align-items: center; }
  .week-card .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border-strong); }
  .week-card .dot.active { background: var(--accent); }
  .week-card .chev { color: var(--text-dim); font-size: 18px; }

  /* ---------- plan view ---------- */
  .phase {
    margin-bottom: 20px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
  }
  .phase-head {
    padding: 14px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
  }
  .phase-head .num {
    font-family: var(--display); font-weight: 700; font-size: 40px; letter-spacing: -0.02em; color: var(--bg-elev-2);
    line-height: 0.9; flex-shrink: 0; width: 44px;
  }
  .phase.current .phase-head .num { color: var(--accent); }
  .phase-head .info { flex: 1; min-width: 0; }
  .phase-head .info .name { font-family: var(--display); font-weight: 600; font-size: 18px; letter-spacing: 0.04em; text-transform: uppercase; }
  .phase-head .info .range { font-size: 11px; color: var(--text-muted); font-family: var(--mono); letter-spacing: 0.04em; margin-top: 2px; }
  .phase-head .chev { color: var(--text-dim); font-size: 18px; transition: transform 0.2s ease; }
  .phase.open .phase-head .chev { transform: rotate(90deg); }

  .phase-body { display: none; padding: 0 14px 14px; }
  .phase.open .phase-body { display: block; }
  .phase-intro { font-size: 12px; color: var(--text-muted); line-height: 1.55; margin-bottom: 14px; padding: 10px; background: var(--bg); border-radius: var(--radius-s); border: 1px solid var(--border); }

  .plan-week {
    padding: 10px 0; border-top: 1px solid var(--border); cursor: pointer;
    display: grid; grid-template-columns: 58px 1fr auto; gap: 10px; align-items: start;
  }
  .plan-week:first-child { border-top: none; padding-top: 0; }
  .plan-week .wnum {
    font-family: var(--mono); font-size: 11px; color: var(--text-muted); letter-spacing: 0.04em;
    text-transform: uppercase; padding-top: 3px;
  }
  .plan-week.current .wnum { color: var(--accent); }
  .plan-week .wbody .wtitle { font-family: var(--display); font-weight: 500; font-size: 13px; letter-spacing: 0.05em; text-transform: uppercase; }
  .plan-week .wbody .wsub { font-size: 11px; color: var(--text-muted); margin-top: 3px; line-height: 1.5; }
  .plan-week .wbody .wsub b { color: var(--text); font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
  .plan-week .wrir { font-family: var(--mono); font-size: 10px; color: var(--text-muted); padding-top: 3px; white-space: nowrap; }

  /* ---------- paces ---------- */
  .paces-intro { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.5; }
  .paces-intro b { color: var(--text); font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; }
  .pace-row {
    display: grid; grid-template-columns: 1fr auto; gap: 10px; padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .pace-row:last-child { border-bottom: none; }
  .pace-row .pname { font-family: var(--display); font-weight: 600; font-size: 14px; letter-spacing: 0.06em; text-transform: uppercase; }
  .pace-row .pnote { font-size: 11px; color: var(--text-muted); margin-top: 3px; line-height: 1.4; }
  .pace-row .pval { font-family: var(--mono); font-size: 13px; text-align: right; white-space: nowrap; }
  .pace-row .pval .arrow { color: var(--text-dim); padding: 0 4px; }
  .pace-row .pval .now { color: var(--accent); }
  .pace-row .pval .goal { color: var(--text); }

  .tt-history {
    margin-top: 24px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px;
  }
  .tt-history h3 {
    margin: 0 0 12px; font-family: var(--display); font-weight: 600; font-size: 16px; letter-spacing: 0.06em; text-transform: uppercase;
  }
  .tt-row { display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: baseline; padding: 8px 0; border-bottom: 1px dashed var(--border); }
  .tt-row:last-child { border-bottom: none; }
  .tt-row .wk { font-family: var(--mono); font-size: 11px; color: var(--text-muted); letter-spacing: 0.04em; }
  .tt-row .lab { font-size: 12px; }
  .tt-row .val { font-family: var(--mono); font-size: 13px; }
  .tt-row input.tt-input { width: 70px; background: var(--bg); border: 1px solid var(--border-strong); color: var(--text); font-family: var(--mono); font-size: 13px; padding: 4px 6px; border-radius: 4px; text-align: right; }
  .tt-row .target { color: var(--text-muted); font-size: 11px; }

  /* ---------- generic ---------- */
  h2.section-head { font-family: var(--display); font-weight: 600; font-size: 20px; letter-spacing: 0.06em; text-transform: uppercase; margin: 20px 0 10px; }
  .hint { font-size: 11px; color: var(--text-muted); margin-top: 6px; font-style: italic; }

  .dl-btn {
    display: block; width: 100%; margin: 0 0 14px;
    appearance: none; background: var(--bg-elev); border: 1px solid var(--border-strong);
    color: var(--text-muted); padding: 10px; border-radius: var(--radius-s);
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; text-align: center;
  }
  .dl-btn:active { background: var(--bg-elev-2); }

  .tv-btn {
    appearance: none; border: 1px solid var(--border); background: transparent; color: var(--text-muted);
    padding: 5px 4px; border-radius: 6px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; transition: all 0.15s;
  }
  .tv-btn.tv-active { background: var(--bg-elev-2); color: var(--warn); border-color: var(--warn); }
  .tv-btn:active { opacity: 0.7; }

  .waist-box {
    background: linear-gradient(135deg, rgba(255,180,0,0.08), rgba(255,180,0,0.02));
    border: 1px solid rgba(255,180,0,0.2);
    padding: 12px 14px; border-radius: var(--radius); margin: 14px 0;
    font-size: 12px; color: var(--text);
  }
  .waist-box .title { font-family: var(--display); font-weight: 600; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--warn); margin-bottom: 4px; }

  .week-nav {
    display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 14px;
  }
  .week-nav button { appearance: none; background: var(--bg-elev); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: var(--radius-s); font-family: var(--display); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; }
  .week-nav button:disabled { opacity: 0.4; cursor: not-allowed; }
  .week-nav .wlabel { font-family: var(--display); font-weight: 600; font-size: 16px; letter-spacing: 0.06em; text-transform: uppercase; }

  /* race countdown banner */
  .race-banner {
    background: linear-gradient(135deg, var(--race), var(--accent));
    color: #fff; padding: 14px; border-radius: var(--radius); margin-bottom: 14px;
    font-family: var(--display); letter-spacing: 0.06em; text-transform: uppercase;
    display: flex; justify-content: space-between; align-items: center;
  }
  .race-banner .lab { font-size: 11px; opacity: 0.9; }
  .race-banner .days { font-size: 24px; font-weight: 700; }

  @media (max-width: 380px) {
    .brand { font-size: 22px; }
    .day-header .dow { font-size: 26px; }
    .session .title { font-size: 17px; }
    .modal-head h2 { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="app">

  <header class="top">
    <div class="brand-row">
      <div class="brand">HYBRID GORILLA<span class="accent">.</span></div>
      <div class="countdown">
        <span>Race Day</span>
        <strong id="raceCountdown">—</strong>
      </div>
    </div>
    <div class="status-bar">
      <span id="phaseBadge">Phase 1</span>
      <span class="sep">·</span>
      <span id="weekBadge">Week 1 / 36</span>
      <span class="sep">·</span>
      <span id="dayBadge">Day 1 / 252</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </header>

  <nav class="tabs">
    <button data-view="today" class="active">Today</button>
    <button data-view="week">Week</button>
    <button data-view="plan">Plan</button>
    <button data-view="paces">Paces</button>
  </nav>

  <main id="view"></main>

</div>

<div class="modal-overlay" id="modal">
  <div class="modal" id="modalContent"></div>
</div>

<script>
/* ============================================================
   DATA
   ============================================================ */

const PROGRAM_START = new Date('2026-04-20T00:00:00');
const PROGRAM_END   = new Date('2026-12-26T23:59:59');
const TOTAL_WEEKS   = 36;

const PHASES = [
  { id:1, name:'Foundation',      range:'Weeks 1–8 · Apr 20 – Jun 14',   weeks:[1,2,3,4,5,6,7,8],
    liftDays:['mon','wed','fri'], intro:'Build habits, standardize form, accumulate stimulus. Running introduces threshold and VO2max fartleks. Deload + first time trial at Week 8 targeting ~20:00–20:30.' },
  { id:2, name:'Volume Bump',     range:'Weeks 9–16 · Jun 15 – Aug 9',   weeks:[9,10,11,12,13,14,15,16],
    liftDays:['mon','wed','fri'], intro:'+20% volume on delts, back, and quads. Running introduces goal-pace intervals (6:00/mi). Week 16 time trial target: 18:45–19:15.' },
  { id:3, name:'Transition',      range:'Weeks 17–24 · Aug 10 – Oct 4',  weeks:[17,18,19,20,21,22,23,24],
    liftDays:['mon','wed'],       intro:'Lifting drops to 2 days/week (Upper A Mon + Lower Wed). Upper B is dropped. Running becomes the priority. Week 23 time trial target: 18:30.' },
  { id:4, name:'Peak Running',    range:'Weeks 25–32 · Oct 5 – Nov 29',  weeks:[25,26,27,28,29,30,31,32],
    liftDays:['mon','wed'],       intro:'Lifts are maintenance only — 30 min sessions, compounds only, no isolation. Running hits peak volume with 5K-specific work. Week 31 time trial target: 18:10–18:25.' },

/* Weekly template - defines what each day of the week is */
const DAYS = ['mon','tue','wed','thu','fri','sat','sun'];
const DAY_NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

function getDayPlan(weekNum, dayIdx) {
  const week = WEEKS[weekNum - 1];
  if (!week) return null;
  const phase = PHASES[week.p - 1];
  const lifts = phase.liftDays; // e.g., ['mon','wed','fri'] or ['mon','wed']
  const dayKey = DAYS[dayIdx];
  const sessions = [];
  const isTT = (dayKey === 'sat' && (week.sat.type === 'race'));
  const isRaceWeek = (weekNum === 8 || weekNum === 16 || weekNum === 23 || weekNum === 31 || weekNum === 36);

  // Lift
  if (lifts.includes(dayKey)) {
    let liftName;
    if (dayKey === 'mon') liftName = 'upperA';
    else if (dayKey === 'wed') liftName = 'lower';
    else if (dayKey === 'fri') liftName = 'upperB';

    // In race week (36), Wed lift is skipped
    if (weekNum === 36 && dayKey === 'wed') {
      // skipped
    } else if (liftName) {
      const maintenance = week.p >= 4;
      const tMode = store.travelMode;
      if (tMode && TRAVEL[tMode] && TRAVEL[tMode][liftName]) {
        sessions.push({ kind:'travelLift', liftData: TRAVEL[tMode][liftName], travelLabel: TRAVEL[tMode].label, rir: week.rir });
      } else {
        sessions.push({ kind:'lift', liftKey: liftName, maintenance, rir: week.rir, phaseNum: week.p });
      }
    }
  }

  // Run
  if (dayKey === 'mon') {
    if (!isRaceWeek) sessions.push({ kind:'easyRun', label:'Easy Run', detail:'30–40 min · add 4–6 × 20-sec strides at end' });
    else if (weekNum !== 36) sessions.push({ kind:'easyRun', label:'Easy Run', detail:'30 min easy, optional strides' });
    else sessions.push({ kind:'easyRun', label:'Easy Shakeout', detail:'20 min easy, keep it very loose' });
  } else if (dayKey === 'tue') {
    sessions.push({ kind:'run', ...week.tue });
  } else if (dayKey === 'wed') {
    if (weekNum === 36) {
      sessions.push({ kind:'rest', label:'Full Rest', detail:'No running. No lifting. Freshen up for Saturday.' });
    } else {
      sessions.push({ kind:'easyRun', label:'Recovery Run', detail:'20–30 min easy · skip if legs feel trashed from lift' });
    }
  } else if (dayKey === 'thu') {
    sessions.push({ kind:'run', ...week.thu });
  } else if (dayKey === 'fri') {
    if (weekNum === 36) {
      sessions.push({ kind:'rest', label:'Full Rest', detail:'Day before race. Zero. Walk, stretch, hydrate.' });
    } else {
      // Always add easy run on Friday (whether or not there's a lift)
      sessions.push({ kind:'easyRun', label:'Easy Run', detail:'30–40 min easy · OR swap in Thunder 45 here' });
    }
  } else if (dayKey === 'sat') {
    sessions.push({ kind:'run', ...week.sat });
  } else if (dayKey === 'sun') {
    if (weekNum === 36) {
      sessions.push({ kind:'rest', label:'Recovery', detail:'Post-race. Easy walk, lots of food, bask in it.' });
    } else {
      sessions.push({ kind:'rest', label:'Rest / Thunder 45', detail:'Thunder 45 OR full rest OR 20 min easy shakeout' });
    }
  }

  // Delt Finisher — on all non-lift days (Tue, Thu, Sun) and optionally Sat
  const isLiftDay = lifts.includes(dayKey);
  if (!isLiftDay && dayKey !== 'sun' && dayKey !== 'sat') {
    // Tue, Thu: mandatory finisher
    const deltData = week.p <= 2 ? DELT_FINISHER.p12 : DELT_FINISHER.p345;
    sessions.push({ kind:'deltFinisher', ...deltData, phaseNum: week.p });
  } else if (dayKey === 'sun') {
    const deltData = week.p <= 2 ? DELT_FINISHER.p12 : DELT_FINISHER.p345;
    sessions.push({ kind:'deltFinisher', ...deltData, phaseNum: week.p });
  } else if (dayKey === 'sat' && week.sat.type !== 'race') {
    const deltData = week.p <= 2 ? DELT_FINISHER.p12 : DELT_FINISHER.p345;
    sessions.push({ kind:'deltFinisher', ...deltData, optional: true, phaseNum: week.p });
  }

  // Abs Session (daily, replaces waist training)
  sessions.push({ kind:'abs', phaseNum: week.p });

  return { week, phase, sessions, dayKey, dayIdx };
}

/* ============================================================
   STATE & STORAGE
   ============================================================ */

const STORAGE_KEY = 'hybrid-sub18-v2';
let store = loadStore();

function loadStore() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { completion: {}, notes: {}, tt: {}, travelMode: false };
}
function saveStore() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(store)); } catch(e) {}
}

function sessionKey(weekN, dayIdx, sessionIdx) {
  return `w${weekN}-d${dayIdx}-s${sessionIdx}`;
}

/* ============================================================
   DATE UTILITIES
   ============================================================ */

function getCurrentWeek() {
  const now = new Date();
  const diffDays = Math.floor((now - PROGRAM_START) / (1000 * 60 * 60 * 24));
  if (diffDays < 0) return 1;
  const w = Math.floor(diffDays / 7) + 1;
  return Math.min(w, TOTAL_WEEKS);
}

function getCurrentDayIdx() {
  // Mon = 0, Sun = 6
  const now = new Date();
  const jsDay = now.getDay(); // 0 = Sun, 1 = Mon, ..., 6 = Sat
  return (jsDay + 6) % 7;
}

function getDayDate(weekN, dayIdx) {
  const d = new Date(PROGRAM_START);
  d.setDate(d.getDate() + (weekN - 1) * 7 + dayIdx);
  return d;
}

function fmtDate(d) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[d.getMonth()]} ${d.getDate()}`;
}
function fmtDateLong(d) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}
function daysUntilRace() {
  const now = new Date();
  const race = new Date('2026-12-26T00:00:00');
  return Math.ceil((race - now) / (1000 * 60 * 60 * 24));
}

/* ============================================================
   RENDERING
   ============================================================ */

let state = {
  view: 'today',
  selectedWeek: getCurrentWeek(),
};

const viewEl = document.getElementById('view');
const modalEl = document.getElementById('modal');
const modalContent = document.getElementById('modalContent');

/* --- status header --- */
function renderHeader() {
  const curWeek = getCurrentWeek();
  const curDay = getCurrentDayIdx();
  const dayNum = (curWeek - 1) * 7 + curDay + 1;
  const phase = PHASES[(WEEKS[curWeek-1]||WEEKS[0]).p - 1];
  document.getElementById('phaseBadge').textContent = `Phase ${phase.id}: ${phase.name}`;
  document.getElementById('weekBadge').textContent = `Wk ${curWeek} / ${TOTAL_WEEKS}`;
  document.getElementById('dayBadge').textContent = `Day ${Math.min(dayNum, 252)} / 252`;

  const progress = Math.min(100, (dayNum / 252) * 100);
  document.getElementById('progressFill').style.width = progress + '%';

  const days = daysUntilRace();
  document.getElementById('raceCountdown').textContent = days > 0 ? `${days} days` : (days === 0 ? 'TODAY' : 'DONE');
}

/* --- tab switcher --- */
function setView(v) {
  state.view = v;
  document.querySelectorAll('nav.tabs button').forEach(b => {
    b.classList.toggle('active', b.dataset.view === v);
  });
  render();
}

document.querySelectorAll('nav.tabs button').forEach(b => {
  b.addEventListener('click', () => setView(b.dataset.view));
});

/* --- modal --- */
function openModal(html) {
  modalContent.innerHTML = html;
  modalEl.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  modalEl.classList.remove('open');
  document.body.style.overflow = '';
}
modalEl.addEventListener('click', e => {
  if (e.target === modalEl) closeModal();
});

/* --- main render --- */
function render() {
  renderHeader();
  if (state.view === 'today') renderToday();
  else if (state.view === 'week') renderWeek();
  else if (state.view === 'plan') renderPlan();
  else if (state.view === 'paces') renderPaces();
}

function renderToday() {
  const curWeek = getCurrentWeek();
  const curDay = getCurrentDayIdx();
  const plan = getDayPlan(curWeek, curDay);
  if (!plan) { viewEl.innerHTML = '<p>Program not active.</p>'; return; }
  const date = getDayDate(curWeek, curDay);

  // Race banner for key days
  let banner = '';
  if (curWeek === 36) {
    const days = daysUntilRace();
    banner = `<div class="race-banner"><div><div class="lab">Race Week</div><div>Sub-18 Attempt</div></div><div class="days">${days}d</div></div>`;
  }

  const tm = store.travelMode;
  const travelBanner = `
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:14px;background:var(--bg-elev);border:1px solid var(--border);border-radius:10px;padding:8px 10px;">
      <span style="font-family:var(--mono);font-size:10px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;flex:none;">Gym:</span>
      <button onclick="setTravel(false)" class="tv-btn ${!tm?'tv-active':''}" style="flex:1;">Home</button>
      <button onclick="setTravel('best')" class="tv-btn ${tm==='best'?'tv-active':''}" style="flex:1;">Travel · Best</button>
      <button onclick="setTravel('worst')" class="tv-btn ${tm==='worst'?'tv-active':''}" style="flex:1;">Travel · Worst</button>
    </div>
  `;

  let html = `
    ${banner}
    ${travelBanner}
    <div class="day-header">
      <div class="dow">${DAY_NAMES[curDay]}</div>
      <div class="date">${fmtDateLong(date)}</div>
    </div>
    <div class="day-subnote">
      <span class="pill">Wk ${curWeek}</span>
      <span class="pill">Ph ${plan.phase.id}</span>
      ${plan.week.rir}
    </div>
  `;

  if (plan.week.focus) {
    html += `<div class="hint" style="margin-bottom:14px;">${plan.week.focus}</div>`;
  }

  plan.sessions.forEach((s, idx) => {
    html += renderSessionCard(s, curWeek, curDay, idx);
  });

  viewEl.innerHTML = html;
  attachSessionHandlers(curWeek, curDay);
}

function setTravel(mode) {
  store.travelMode = mode;
  saveStore();
  render();
}

function renderSessionCard(s, weekN, dayIdx, sessIdx) {
  const key = sessionKey(weekN, dayIdx, sessIdx);
  const done = store.completion[key];

  if (s.kind === 'lift') {
    const lift = LIFT[s.liftKey];
    return `
      <div class="session lift ${done ? 'done' : ''}" data-sess="${sessIdx}">
        <div class="row1">
          <div><div class="label">LIFT · ${s.maintenance ? 'MAINTENANCE' : 'FULL'}</div><div class="title">${lift.name}</div></div>
        </div>
        <div class="meta">${lift.duration} · ${lift.focus}<br><span class="mono">${s.rir}</span></div>
        <button class="open" data-action="lift" data-key="${s.liftKey}" data-maint="${s.maintenance}" data-week="${weekN}">View Session →</button>
        <div class="check"><label><input type="checkbox" ${done?'checked':''} data-toggle="${key}"> Mark complete</label></div>
      </div>
    `;
  }
  if (s.kind === 'travelLift') {
    const d = s.liftData;
    return `
      <div class="session lift ${done ? 'done' : ''}" data-sess="${sessIdx}" style="border-color:var(--warn);">
        <div class="row1">
          <div><div class="label" style="color:var(--warn);">LIFT · ${s.travelLabel.toUpperCase()}</div><div class="title">${d.name}</div></div>
        </div>
        <div class="meta">${d.duration} · ${d.focus}<br><span class="mono" style="color:var(--warn);">${d.note || ''}</span></div>
        <button class="open" data-action="travelLift" data-week="${weekN}" style="border-color:var(--warn);">View Session →</button>
        <div class="check"><label><input type="checkbox" ${done?'checked':''} data-toggle="${key}"> Mark complete</label></div>
      </div>
    `;
  }
  if (s.kind === 'run') {
    const typeMap = { threshold:'quality', vo2:'quality', long:'long', easy:'easy', race:'race' };
    const labelMap = { threshold:'RUN · THRESHOLD', vo2:'RUN · VO2', long:'RUN · LONG', easy:'RUN · EASY', race:'RACE' };
    const cls = typeMap[s.type] || 'easy';
    return `
      <div class="session ${cls} ${done ? 'done' : ''}" data-sess="${sessIdx}">
        <div class="row1">
          <div><div class="label">${labelMap[s.type] || 'RUN'}</div><div class="title">${s.t}</div></div>
        </div>
        <div class="meta">${s.w}${s.d ? `<br><span class="mono">${s.d}</span>` : ''}</div>
        <div class="check"><label><input type="checkbox" ${done?'checked':''} data-toggle="${key}"> Mark complete</label></div>
      </div>
    `;
  }
  if (s.kind === 'easyRun') {
    return `
      <div class="session easy ${done ? 'done' : ''}" data-sess="${sessIdx}">
        <div class="row1">
          <div><div class="label">RUN · EASY</div><div class="title">${s.label}</div></div>
        </div>
        <div class="meta">${s.detail}</div>
        <div class="check"><label><input type="checkbox" ${done?'checked':''} data-toggle="${key}"> Mark complete</label></div>
      </div>
    `;
  }
  if (s.kind === 'rest') {
    return `
      <div class="session rest" data-sess="${sessIdx}">
        <div class="row1">
          <div><div class="label">REST</div><div class="title">${s.label}</div></div>
        </div>

  if (s.kind === 'deltFinisher') {
    return `
      <div class="session daily ${done ? 'done' : ''}" data-sess="${sessIdx}" style="border-left-color:var(--warn);">
        <div class="row1">
          <div><div class="label" style="color:var(--warn);">DELTS · ${s.optional ? 'OPTIONAL ' : ''}FINISHER</div><div class="title">${s.label}</div></div>
        </div>
        <div class="meta">${s.duration} · Lateral + Rear Head</div>
        <button class="open" data-action="delt" data-phase="${s.phaseNum}">View Finisher →</button>
        <div class="check"><label><input type="checkbox" ${done?'checked':''} data-toggle="${key}"> Mark complete</label></div>
      </div>
    `;
  }
  if (s.kind === 'abs') {
    return `
      <div class="session daily ${done ? 'done' : ''}" data-sess="${sessIdx}" style="border-left-color:#9b59b6;">
        <div class="row1">
          <div><div class="label" style="color:#9b59b6;">ABS · 10–12 MIN</div><div class="title">Core Session</div></div>
        </div>
        <div class="meta">Hanging leg raise · Cable crunch · Ab wheel/TRX · RKC plank<br><span class="mono" style="color:var(--text-muted);">Vacuums: do throughout day, not here</span></div>

        <div class="check"><label><input type="checkbox" ${done?'checked':''} data-toggle="${key}"> Mark complete</label></div>
      </div>
    `;
  }
  return '';
}

function attachSessionHandlers(weekN, dayIdx) {
  const root = arguments[2] || viewEl;
  root.querySelectorAll('[data-toggle]').forEach(cb => {
    cb.addEventListener('change', e => {
      const k = e.target.dataset.toggle;
      store.completion[k] = e.target.checked;
      saveStore();
      const card = e.target.closest('.session');
      if (card) card.classList.toggle('done', e.target.checked);
    });
  });
  root.querySelectorAll('[data-action="lift"]').forEach(btn => {
    btn.addEventListener('click', () => {
      openLiftModal(btn.dataset.key, btn.dataset.maint === 'true', parseInt(btn.dataset.week) || weekN);
    });
  });
  root.querySelectorAll('[data-action="travelLift"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const plan = getDayPlan(parseInt(btn.dataset.week) || weekN, dayIdx);
      const ts = plan.sessions.find(s => s.kind === 'travelLift');
      if (ts) openTravelLiftModal(ts.liftData, ts.travelLabel);
    });
  });
  root.querySelectorAll('[data-action="delt"]').forEach(btn => {
    btn.addEventListener('click', () => openDeltModal(parseInt(btn.dataset.phase)));
  });
  root.querySelectorAll('[data-action="abs"]').forEach(btn => {
    btn.addEventListener('click', openAbsModal);
  });
}

function openLiftModal(key, maintenance, weekN) {
  const lift = LIFT[key];
  let ex = lift.exercises;
  if (maintenance) ex = ex.filter(e => e.maintenance !== false);
  const weekFocus = (WEEKS[weekN-1] || {}).focus || '';
  const weekData = WEEKS[weekN-1] || {};
  const phaseN = weekData.p || 1;

  // Phase 2+ gets an extra set on lateral raises
  let html = `
    <div class="modal-head">
      <div>
        <h2>${lift.name}</h2>
        <div class="sub">${lift.focus} · ${maintenance ? '30 min maintenance' : lift.duration}</div>
      </div>
      <button class="close" onclick="closeModal()">✕</button>
    </div>
  `;
  if (weekFocus) html += `<div class="hint" style="margin-bottom:12px;">${weekFocus}</div>`;
  ex.forEach(e => {
    let sets = maintenance && e.maintenanceSets ? e.maintenanceSets : e.sets;
    // Phase 2+ bump on lateral raises
    if (!maintenance && phaseN >= 2 && (e.name.includes('Lateral Raise') || e.name.includes('Lean-Away'))) {
      sets = Math.min(sets + 1, 5);
    }
    html += `
      <div class="exercise">
        <div class="ord">${e.ord}</div>
        <div>
          <div class="name">${e.name}</div>
          <div class="note">${e.note}</div>
        </div>
        <div class="sets">${sets} sets<span class="reps">${e.reps}</span></div>
      </div>
    `;
  });

  const notesKey = `lift-${key}-w${weekN}`;
  const notes = store.notes[notesKey] || '';
  html += `
    <div class="notes-box">
      <label>Session Notes (Loads, reps, feel)</label>
      <textarea id="liftNotes" placeholder="e.g. Bench 135×9, Lateral raise 20lb×14...">${notes.replace(/</g,'&lt;')}</textarea>
    </div>
  `;
  openModal(html);
  document.getElementById('liftNotes').addEventListener('input', e => {
    store.notes[notesKey] = e.target.value;
    saveStore();
  });
}

/* --- week view --- */
function renderWeek() {
  const wk = state.selectedWeek;
  const week = WEEKS[wk - 1];
  const phase = PHASES[week.p - 1];
  const today = getCurrentDayIdx();
  const curWeek = getCurrentWeek();

  let html = `
    <div class="week-nav">
      <button ${wk <= 1 ? 'disabled' : ''} onclick="navWeek(-1)">← Prev</button>
      <div class="wlabel">Week ${wk} · ${phase.name}</div>
      <button ${wk >= TOTAL_WEEKS ? 'disabled' : ''} onclick="navWeek(1)">Next →</button>
    </div>
    <div class="day-subnote">
      <span class="pill">Phase ${phase.id}</span>
      ${week.rir}
    </div>
  `;

  if (week.focus) {
    html += `<div class="hint" style="margin-bottom:14px;">${week.focus}</div>`;
  }

  for (let i = 0; i < 7; i++) {
    const date = getDayDate(wk, i);
    const plan = getDayPlan(wk, i);
    const isToday = (wk === curWeek && i === today);
    let summary = plan.sessions
      .filter(s => s.kind !== 'daily')
      .map(s => {
        if (s.kind === 'lift') return LIFT[s.liftKey].name;
        if (s.kind === 'run') return s.t;
        if (s.kind === 'easyRun') return s.label;
        if (s.kind === 'rest') return s.label;
        return '';
      }).filter(Boolean).join(' + ');
    if (!summary) summary = 'Rest';

    // Count completion
    let completedCount = 0, totalCount = 0;
    plan.sessions.forEach((s, idx) => {
      if (s.kind === 'rest') return;
      totalCount++;
      if (store.completion[sessionKey(wk, i, idx)]) completedCount++;
    });

    const dotsHtml = Array.from({length: totalCount}, (_, j) =>
      `<div class="dot ${j < completedCount ? 'active' : ''}"></div>`
    ).join('');

    html += `
      <div class="week-card ${isToday ? 'today' : ''}" onclick="goToDay(${wk}, ${i})">
        <div class="dow-box">${DAY_NAMES[i].slice(0,3).toUpperCase()}<span class="num">${date.getDate()}</span></div>
        <div class="content">
          <div class="title">${summary}</div>
          <div class="sub">${fmtDate(date)}</div>
        </div>
        <div class="dots">${dotsHtml}</div>
      </div>
    `;
  }

  viewEl.innerHTML = html;
}

function navWeek(delta) {
  state.selectedWeek = Math.min(TOTAL_WEEKS, Math.max(1, state.selectedWeek + delta));
  renderWeek();
}

function goToDay(wk, dayIdx) {
  // Jump to a specific day preview modal
  const plan = getDayPlan(wk, dayIdx);
  const date = getDayDate(wk, dayIdx);
  let html = `
    <div class="modal-head">
      <div>
        <h2>${DAY_NAMES[dayIdx]}</h2>
        <div class="sub">${fmtDateLong(date)} · Week ${wk}</div>
      </div>
      <button class="close" onclick="closeModal()">✕</button>
    </div>
  `;
  plan.sessions.forEach((s, idx) => {
    html += renderSessionCardInModal(s, wk, dayIdx, idx);
  });
  openModal(html);
  // Attach handlers in modal
  modalEl.querySelectorAll('[data-toggle]').forEach(cb => {
    cb.addEventListener('change', e => {
      store.completion[e.target.dataset.toggle] = e.target.checked;
      saveStore();
      const card = e.target.closest('.session');
      if (card) card.classList.toggle('done', e.target.checked);
    });
  });
  modalEl.querySelectorAll('[data-action="lift"]').forEach(btn => {
    btn.addEventListener('click', () => openLiftModal(btn.dataset.key, btn.dataset.maint === 'true', parseInt(btn.dataset.week) || wk));
  });
  modalEl.querySelectorAll('[data-action="travelLift"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const plan2 = getDayPlan(wk, dayIdx);
      const ts = plan2.sessions.find(s => s.kind === 'travelLift');
      if (ts) openTravelLiftModal(ts.liftData, ts.travelLabel);
    });
  });
  modalEl.querySelectorAll('[data-action="delt"]').forEach(btn => {
    btn.addEventListener('click', () => openDeltModal(parseInt(btn.dataset.phase)));
  });
  modalEl.querySelectorAll('[data-action="abs"]').forEach(btn => {
    btn.addEventListener('click', openAbsModal);
  });
}

function renderSessionCardInModal(s, weekN, dayIdx, sessIdx) {
  // Reuse the same card rendering
  return renderSessionCard(s, weekN, dayIdx, sessIdx);
}

/* --- plan view --- */
function renderPlan() {
  const curWeek = getCurrentWeek();
  let html = '';
  PHASES.forEach(phase => {
    const isCurrent = phase.weeks.includes(curWeek);
    const isOpen = isCurrent; // auto-open current phase
    html += `
      <div class="phase ${isCurrent ? 'current' : ''} ${isOpen ? 'open' : ''}" data-phase="${phase.id}">
        <div class="phase-head" onclick="togglePhase(${phase.id})">
          <div class="num">${phase.id}</div>
          <div class="info">
            <div class="name">${phase.name}</div>
            <div class="range">${phase.range}</div>
          </div>
          <div class="chev">▸</div>
        </div>
        <div class="phase-body">
          <div class="phase-intro">${phase.intro}</div>
    `;
    phase.weeks.forEach(wn => {
      const week = WEEKS[wn - 1];
      const isCur = (wn === curWeek);
      html += `
        <div class="plan-week ${isCur ? 'current' : ''}" onclick="gotoWeek(${wn})">
          <div class="wnum">WK ${String(wn).padStart(2,'0')}</div>
          <div class="wbody">
            <div class="wtitle">${week.sat.t === 'TIME TRIAL' || week.sat.t === 'SUB-18 TIME TRIAL' ? '⚡ ' + week.sat.t : weekSummary(week)}</div>
            <div class="wsub">
              <b>T</b> ${week.tue.w}<br>
              <b>R</b> ${week.thu.w}<br>
              <b>L</b> ${week.sat.w}
            </div>
          </div>
          <div class="wrir">${week.rir.includes('DELOAD') ? 'DELOAD' : week.rir.includes('TT') ? 'TT WK' : ''}</div>
        </div>
      `;
    });
    html += `</div></div>`;
  });
  viewEl.innerHTML = html;
}

function weekSummary(week) {
  if (week.rir.includes('DELOAD')) return 'DELOAD';
  const titles = [week.tue.t, week.thu.t].filter(t => t !== 'Strides' && t !== 'Easy Fartlek');
  return titles[0] || 'Build Week';
}

function togglePhase(id) {
  const el = document.querySelector(`.phase[data-phase="${id}"]`);
  if (el) el.classList.toggle('open');
}

function gotoWeek(wn) {
  state.selectedWeek = wn;
  setView('week');
}

window.downloadSelf = function() {
  const html = document.documentElement.outerHTML;
  const blob = new Blob(['<!DOCTYPE html>\n' + html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'hybrid-gorilla.html';
  a.click();
  URL.revokeObjectURL(a.href);
};
